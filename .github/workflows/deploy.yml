# Simple GitHub Actions workflow to build and deploy Vite to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Change this to master if your default branch is named master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build
        env:
          # If needed, add environment variables here
          NODE_ENV: production

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite builds into the dist folder
          branch: gh-pages # The branch the action will deploy to
